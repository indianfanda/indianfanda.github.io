<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Fanda | Oficiální Web</title>
    <style>
        body { background: #000; color: white; font-family: Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { background: #ff9800; padding: 40px; }
        h1 { margin: 0; font-size: 2.5rem; text-transform: uppercase; color: #000; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        .sekce { background: #111; border: 2px solid #ff9800; border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        h2 { color: #ff9800; }

        /* Odkazy na sítě */
        .btn { display: block; padding: 15px; margin: 10px 0; text-decoration: none; border-radius: 12px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-yt { background: #ff0000; }
        .btn-fb { background: #1877f2; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* Videa pod sebou */
        .video-list { display: flex; flex-direction: column; gap: 20px; }
        .video-item { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; border: 2px solid #333; }
        .video-item iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>Indian Fanda</h1>
</div>

<div class="container">

    <div class="sekce">
        <h2>🚀 Moje Kanály</h2>
        <a href="https://www.youtube.com/@indianfanda" class="btn btn-yt">Můj Hlavní YouTube Kanál</a>
        <a href="https://www.facebook.com" class="btn btn-fb">Můj Facebook</a>
    </div>

    <div class="sekce">
        <h2>🎬 Moje Videa</h2>
        <div class="video-list">
            
            <div class="video-item">
                <iframe src="https://www.youtube.com/embed/ZDEWpAt70_o"></iframe>
            </div>

            <div class="video-item">
                <iframe src="https://www.youtube.com/embed/ZDEWpAt70_o"></iframe>
            </div>

            </div>
    </div>

    <footer style="color: #444; padding: 20px;">
        © 2026 Indian Fanda
    </footer>

</div>

</body>
</html>
